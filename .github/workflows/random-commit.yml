name: Random Commit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commit at a random hour
        run: |
          set -ex

          roll=0

          echo "$(date -u)" >> research-log.txt

          git config user.email "${{ secrets.GIT_USER_EMAIL }}"
          git config user.name "SircoGeji"

          git add research-log.txt
          git commit -m "chore: research log $(date -u +%Y-%m-%d)"
          git push
